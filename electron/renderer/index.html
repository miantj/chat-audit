<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>聊天审计导出工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>聊天审计导出工具</h1>
      <p class="subtitle">请仅在应用弹出的专用 Chrome 中登录（配置 ~/.chrome-chat-audit-profile）；关闭后重开仍会保留，日常 Chrome 的登录无效</p>
    </header>

    <main>
      <div class="form-section">
        <div class="form-group date-form-group">
          <div class="date-header">
            <label>导出日期</label>
            <div class="date-presets">
              <button type="button" class="btn-preset" data-preset="yesterday">昨天</button>
              <button type="button" class="btn-preset" data-preset="today">今天</button>
            </div>
          </div>
          <div class="date-range-row">
            <input type="date" id="startDate" aria-label="开始日期">
            <span class="date-range-label">至</span>
            <input type="date" id="endDate" aria-label="结束日期">
          </div>
          <label class="inline-check">
            <input type="checkbox" id="singleDayMode" checked>
            单日导出（开始与结束为同一天）
          </label>
          <p id="dateSummary" class="date-summary"></p>
        </div>

        <div class="form-group">
          <label for="department">部门</label>
          <select id="department">
            <option value="大客私域顾问-总">大客私域顾问-总</option>
          </select>
        </div>

        <div class="form-group">
          <label for="outputDir">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="outputDir" readonly placeholder="选择输出目录">
            <button type="button" id="selectDir" class="btn-secondary">选择</button>
          </div>
        </div>

      </div>

      <div class="button-group">
        <button type="button" id="startBtn" class="btn-primary">开始导出</button>
        <button type="button" id="pauseBtn" class="btn-secondary" disabled>暂停</button>
        <button type="button" id="resumeBtn" class="btn-secondary" disabled>继续</button>
        <button type="button" id="stopBtn" class="btn-danger" disabled>停止</button>
      </div>

      <div class="status-section">
        <div id="statusBar" class="status-bar">就绪</div>
      </div>

      <div class="progress-container">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <span id="progressText" class="progress-text">0%</span>
      </div>

      <div class="log-section">
        <div id="logContent" class="log-content"></div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
